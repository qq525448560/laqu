name: 每小时拉取内容并生成txt
on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决Node.js警告
    permissions:
      contents: write  # 给机器人写入权限，解决403错误
    steps:
      - uses: actions/checkout@v4

      - name: 下载并覆盖 hebing.txt
        run: |
          curl -L "https://github.xmm1993.top/qq525448560/wbccq/refs/heads/main/hebing.csv?token=aniu" -o hebing.txt

      - name: 提交更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新 hebing.txt"
          add: "hebing.txt"
